<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupee Expense Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>.hidden { display: none !important; }</style>
</head>
<body class="bg-gray-50 font-sans min-h-screen text-gray-800">
    <div id="auth-page" class="flex items-center justify-center min-h-screen px-4">
        <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md border border-gray-100">
            <h2 id="auth-title" class="text-2xl font-bold text-center mb-6 text-emerald-700">Login to RupeeTracker</h2>
            <form id="auth-form" class="space-y-4">
                <div><label class="block text-sm font-semibold mb-1">Email Address</label><input type="email" id="auth-email" required class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-semibold mb-1">Password</label><input type="password" id="auth-password" required class="w-full px-4 py-2 border rounded-lg"></div>
                <button type="submit" id="auth-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg">Login</button>
            </form>
            <p class="text-center text-sm mt-4 text-gray-600">
                <span id="auth-switch-text">Don't have an account?</span>
                <button id="auth-switch-btn" class="text-emerald-600 font-bold underline ml-1">Register</button>
            </p>
        </div>
    </div>

    <div id="app-page" class="hidden">
        <nav class="bg-emerald-700 text-white py-4 px-6 flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold">₹ RupeeTracker</h1>
            <div class="space-x-2">
                <button onclick="showSection('home')" class="px-3 py-1.5 rounded hover:bg-emerald-800 font-medium">Dashboard</button>
                <button onclick="showSection('expenses')" class="px-3 py-1.5 rounded hover:bg-emerald-800 font-medium">View Expenses</button>
                <button id="logout-btn" class="bg-red-600 hover:bg-red-700 px-3 py-1.5 rounded font-medium">Logout</button>
            </div>
        </nav>

        <div class="max-w-6xl mx-auto p-4 md:p-6">
            <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
                <div><p class="text-sm text-gray-500 uppercase tracking-wider font-bold">Total Monthly Budget</p><h2 id="display-total-budget" class="text-3xl md:text-4xl font-extrabold text-gray-900">₹0.00</h2></div>
                <div class="flex gap-2">
                    <button onclick="openBudgetForm()" class="bg-emerald-100 hover:bg-emerald-200 text-emerald-800 font-bold px-4 py-2 rounded-lg">✏️ Setup / Edit Budget</button>
                    <button onclick="openExpenseForm()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-lg">➕ Add Expense</button>
                </div>
            </div>

            <div id="section-home" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"><h3 class="text-md font-bold mb-4 text-gray-700">Budgeted Category Allocations</h3><canvas id="budgetPieChart"></canvas></div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100"><h3 class="text-md font-bold mb-4 text-gray-700">Actual Spending Breakdown</h3><canvas id="expensePieChart"></canvas></div>
                </div>
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100"><h3 class="text-md font-bold mb-4 text-gray-700">Expected vs Actual Spending</h3><canvas id="trendLineChart"></canvas></div>
            </div>

            <div id="section-expenses" class="hidden bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                <h3 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">All Logged Expenses</h3>
                <table class="w-full text-left border-collapse">
                    <thead><tr class="bg-gray-100"><th class="p-3 border-b">Date</th><th class="p-3 border-b">Expense</th><th class="p-3 border-b">Category</th><th class="p-3 border-b">Description</th><th class="p-3 border-b text-right">Amount</th></tr></thead>
                    <tbody id="expense-table-body" class="text-sm divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="budget-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-xl p-6">
            <h3 class="text-xl font-bold mb-4 text-emerald-800">Set Monthly Budget</h3>
            <form id="budget-form" class="space-y-4">
                <div><label class="block text-sm font-bold mb-1">Total Monthly Budget (₹)</label><input type="number" id="input-total-budget" required min="0" class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-bold mb-2">Select Categories & Allocations</label><div id="category-checkboxes-container" class="grid grid-cols-2 gap-3 max-h-60 overflow-y-auto p-2 border bg-gray-50 rounded-lg"></div></div>
                <div class="flex justify-end space-x-2 pt-2 border-t">
                    <button type="button" onclick="closeBudgetModal()" class="px-4 py-2 border rounded-lg">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-emerald-600 text-white font-bold rounded-lg">Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="expense-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
            <h3 class="text-xl font-bold mb-4 text-emerald-800">Add Expense</h3>
            <form id="expense-form" class="space-y-4">
                <div><label class="block text-sm font-bold mb-1">Expense Name</label><input type="text" id="expense-name" required class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-bold mb-1">Category</label><select id="expense-category" required class="w-full px-4 py-2 border rounded-lg"></select></div>
                <div><label class="block text-sm font-bold mb-1">Amount (₹)</label><input type="number" id="expense-amount" required min="1" class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-bold mb-1">Date</label><input type="date" id="expense-date" required class="w-full px-4 py-2 border rounded-lg"></div>
                <div><label class="block text-sm font-bold mb-1">Description</label><textarea id="expense-desc" rows="2" class="w-full px-4 py-2 border rounded-lg"></textarea></div>
                <div class="flex justify-end space-x-2 pt-2 border-t">
                    <button type="button" onclick="closeExpenseModal()" class="px-4 py-2 border rounded-lg">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-emerald-600 text-white font-bold rounded-lg">Add</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const CATS = ["Food & Beverages", "Electricity Bills", "Water Bills", "Gas Cylinder/Piped", "Insurance Premia", "Internet & Phone Bills", "House Rent", "Property/Home Loan EMI", "Travel & Petrol", "Maid & Cook Salaries", "School Fees", "Medical & Pharmacy", "Other Expenses"];
        let userID = null, budget = null, expenses = [], isLogin = true;
        
        setTimeout(() => {
            if (!window.supabase) return;
            const app = window.supabase.createClient("https://yitrbyifexlqwtlypjja.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpdHJieWlmZXhscXd0bHlwamphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MjY0MDQsImV4cCI6MjA5OTIwMjQwNH0.c_8ctd-2FQQWur_4e32b-uvEmUSB2hgKW_OJ-1dMtLQ");
            console.log("✅ Ready");

            CATS.forEach((c, i) => {
                const d = document.createElement('div');
                d.innerHTML = `<label class="flex items-center space-x-2 text-sm cursor-pointer"><input type="checkbox" id="chk-${i}" onchange="toggleAmt(${i})"><span>${c}</span></label><input type="number" id="amt-${i}" placeholder="₹" disabled class="hidden text-xs px-2 py-1 w-full border rounded">`;
                document.getElementById('category-checkboxes-container').appendChild(d);
            });

            app.auth.onAuthStateChange((e, s) => {
                if (s?.user) {
                    userID = s.user.id;
                    document.getElementById('auth-page').classList.add('hidden');
                    document.getElementById('app-page').classList.remove('hidden');
                    loadData(app);
                } else {
                    userID = null;
                    document.getElementById('app-page').classList.add('hidden');
                    document.getElementById('auth-page').classList.remove('hidden');
                }
            });

            document.getElementById('auth-switch-btn').addEventListener('click', (e) => {
                e.preventDefault();
                isLogin = !isLogin;
                document.getElementById('auth-title').innerText = isLogin ? "Login" : "Register";
                document.getElementById('auth-btn').innerText = isLogin ? "Login" : "Register";
            });

            document.getElementById('auth-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const em = document.getElementById('auth-email').value;
                const pw = document.getElementById('auth-password').value;
                if (isLogin) {
                    const { error } = await app.auth.signInWithPassword({ email: em, password: pw });
                    if (error) alert("Login Failed: " + error.message);
                } else {
                    const { error } = await app.auth.signUp({ email: em, password: pw });
                    if (error) alert("Registration Failed: " + error.message);
                    else alert("Registration successful!");
                }
            });

            document.getElementById('logout-btn').addEventListener('click', () => app.auth.signOut());

            document.getElementById('budget-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const tot = parseFloat(document.getElementById('input-total-budget').value);
                const cats = [], alloc = {};
                CATS.forEach((c, i) => {
                    if (document.getElementById(`chk-${i}`).checked) {
                        cats.push(c);
                        alloc[c] = parseFloat(document.getElementById(`amt-${i}`).value) || 0;
                    }
                });
                if (budget) {
                    await app.from('budgets').update({ total_budget: tot, selected_categories: cats, category_allocations: alloc }).eq('id', budget.id);
                } else {
                    await app.from('budgets').insert([{ user_id: userID, total_budget: tot, selected_categories: cats, category_allocations: alloc }]);
                }
                closeBudgetModal();
                loadData(app);
            });

            document.getElementById('expense-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const n = document.getElementById('expense-name').value;
                const c = document.getElementById('expense-category').value;
                const a = parseFloat(document.getElementById('expense-amount').value);
                const d = document.getElementById('expense-date').value;
                const desc = document.getElementById('expense-desc').value;
                await app.from('expenses').insert([{ user_id: userID, name: n, category: c, amount: a, expense_date: d, description: desc }]);
                document.getElementById('expense-form').reset();
                closeExpenseModal();
                loadData(app);
            });

            window.toggleAmt = (i) => {
                const c = document.getElementById(`chk-${i}`);
                const a = document.getElementById(`amt-${i}`);
                a.classList.toggle('hidden', !c.checked);
                a.disabled = !c.checked;
            };

            window.showSection = (s) => {
                document.getElementById('section-home').classList.toggle('hidden', s !== 'home');
                document.getElementById('section-expenses').classList.toggle('hidden', s !== 'expenses');
            };

            window.openBudgetForm = () => document.getElementById('budget-modal').classList.remove('hidden');
            window.closeBudgetModal = () => document.getElementById('budget-modal').classList.add('hidden');
            window.openExpenseForm = () => {
                document.getElementById('expense-modal').classList.remove('hidden');
                document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];
            };
            window.closeExpenseModal = () => document.getElementById('expense-modal').classList.add('hidden');

            async function loadData(app) {
                let { data: b } = await app.from('budgets').select('*').eq('user_id', userID).maybeSingle();
                budget = b;
                document.getElementById('display-total-budget').innerText = `₹${(budget?.total_budget || 0).toLocaleString('en-IN')}`;
                
                let { data: e } = await app.from('expenses').select('*').eq('user_id', userID);
                expenses = e || [];
                
                const tb = document.getElementById('expense-table-body');
                tb.innerHTML = expenses.length ? '' : '<tr><td colspan="5" class="p-4 text-center text-gray-400">No expenses yet</td></tr>';
                expenses.forEach(ex => {
                    tb.innerHTML += `<tr><td class="p-3">${new Date(ex.expense_date).toLocaleDateString()}</td><td class="p-3 font-bold">${ex.name}</td><td class="p-3"><span class="bg-emerald-50 text-emerald-700 px-2 py-1 rounded text-xs">${ex.category}</span></td><td class="p-3">${ex.description || '-'}</td><td class="p-3 text-right font-bold">₹${ex.amount}</td></tr>`;
                });

                const dd = document.getElementById('expense-category');
                dd.innerHTML = budget?.selected_categories?.length ? budget.selected_categories.map(c => `<option value="${c}">${c}</option>`).join('') : '<option>-- Setup Budget First --</option>';
            }
        }, 500);
    </script>
</body>
</html>
